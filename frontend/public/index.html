<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>WB 财务分析</title>
  <script src="/lib/react.min.js"></script>
  <script src="/lib/react-dom.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f2f5; }
    .header { background: #001529; color: #fff; padding: 0 24px; display: flex; align-items: center; height: 56px; justify-content: space-between; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .container { max-width: 900px; margin: 0 auto; padding: 16px; }
    .card { background: #fff; border-radius: 8px; padding: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.1); margin-bottom: 16px; }
    .card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #333; }
    .drop-zone { border: 2px dashed #d9d9d9; border-radius: 8px; padding: 28px; text-align: center; background: #fafafa; cursor: pointer; transition: all .3s; }
    .drop-zone:hover { border-color: #1677ff; background: #f0f5ff; }
    .drop-icon { font-size: 36px; color: #1677ff; margin-bottom: 4px; }
    .btn { display: inline-flex; align-items: center; gap: 4px; padding: 8px 20px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; transition: all .3s; text-decoration: none; white-space: nowrap; }
    .btn-primary { background: #1677ff; color: #fff; }
    .btn-primary:hover { background: #4096ff; }
    .btn-success { background: #52c41a; color: #fff; }
    .btn-success:hover { background: #73d13d; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    input[type="file"] { display: none; }
    .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .file-tag { display: inline-block; background: #f6ffed; border: 1px solid #b7eb8f; border-radius: 4px; padding: 3px 8px; font-size: 12px; margin-top: 8px; color: #52c41a; }
    .param-grid { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 16px; align-items: end; }
    .fetch-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr auto; gap: 12px; align-items: end; }
    .param-label { font-size: 12px; color: #999; margin-bottom: 4px; }
    .param-input { width: 100%; padding: 6px 10px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px; text-align: center; }
    .param-input:focus { outline: none; border-color: #1677ff; box-shadow: 0 0 0 2px rgba(22,119,255,.1); }
    .date-input { width: 100%; padding: 6px 10px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px; }
    .date-input:focus { outline: none; border-color: #1677ff; box-shadow: 0 0 0 2px rgba(22,119,255,.1); }
    .fetch-progress { background: #e6f4ff; border: 1px solid #91caff; border-radius: 6px; padding: 14px 16px; margin-top: 12px; display: flex; align-items: center; gap: 10px; font-size: 14px; color: #1677ff; }
    .result-box { background: #f6ffed; border: 1px solid #b7eb8f; border-radius: 6px; padding: 14px 16px; margin-top: 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .result-box .msg { font-weight: 600; color: #52c41a; }
    .tab-bar { background: #fff; border-bottom: 1px solid #e8e8e8; display: flex; padding: 0 16px; }
    .tab-item { padding: 12px 20px; cursor: pointer; font-size: 14px; color: #666; border-bottom: 2px solid transparent; transition: all .3s; user-select: none; }
    .tab-item:hover { color: #1677ff; }
    .tab-item.active { color: #1677ff; border-bottom-color: #1677ff; font-weight: 600; }
    .login-overlay { position: fixed; inset: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .login-box { background: #fff; border-radius: 12px; padding: 40px 32px; width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,.15); text-align: center; }
    .login-box h2 { font-size: 20px; margin: 0 0 4px; }
    .login-box .sub { color: #999; font-size: 13px; margin-bottom: 24px; }
    .login-box .icon { width: 56px; height: 56px; border-radius: 14px; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 28px; color: #fff; }
    .login-input { width: 100%; padding: 10px 12px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; margin-bottom: 12px; }
    .login-input:focus { outline: none; border-color: #1677ff; box-shadow: 0 0 0 2px rgba(22,119,255,.1); }
    .login-btn { width: 100%; padding: 10px; border: none; border-radius: 6px; font-size: 15px; color: #fff; background: linear-gradient(135deg, #667eea, #764ba2); cursor: pointer; }
    .login-btn:disabled { opacity: .6; cursor: not-allowed; }
    .login-err { color: #ff4d4f; font-size: 13px; margin-bottom: 12px; }
    .logout-btn { color: #fff; font-size: 13px; cursor: pointer; opacity: .7; padding: 4px 8px; }
    .logout-btn:hover { opacity: 1; }
    @media (max-width: 768px) { .upload-grid { grid-template-columns: 1fr; } .param-grid { grid-template-columns: 1fr 1fr; } .fetch-grid { grid-template-columns: 1fr 1fr; } .container { padding: 8px; } .card { padding: 16px; } .tab-item { padding: 10px 12px; font-size: 13px; } }
  </style>
</head>
<body>
<div id="root"></div>
<script>
var h = React.createElement;
var useState = React.useState, useEffect = React.useEffect, useRef = React.useRef;
var createRoot = ReactDOM.createRoot;
var API = '/api/v1';

function getToken() { return localStorage.getItem('wb_token'); }

function authFetch(url, opts) {
  opts = opts || {};
  opts.headers = opts.headers || {};
  var t = getToken();
  if (t) opts.headers['Authorization'] = 'Bearer ' + t;
  return fetch(url, opts).then(function(r){
    if (r.status === 401) { localStorage.removeItem('wb_token'); localStorage.removeItem('wb_user'); window.location.reload(); }
    return r;
  });
}

function LoginPage(props) {
  var S = useState(''), user = S[0], setUser = S[1];
  var S2 = useState(''), pass = S2[0], setPass = S2[1];
  var S3 = useState(false), loading = S3[0], setLoading = S3[1];
  var S4 = useState(''), err = S4[0], setErr = S4[1];

  function doLogin() {
    if (!user || !pass) { setErr('请输入用户名和密码'); return; }
    setLoading(true); setErr('');
    fetch(API+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:user,password:pass})})
      .then(function(r){return r.json().then(function(d){return {status:r.status,data:d};});})
      .then(function(r){
        if (r.status !== 200) { setErr(r.data.detail||'登录失败'); setLoading(false); return; }
        localStorage.setItem('wb_token', r.data.token);
        localStorage.setItem('wb_user', r.data.username);
        props.onLogin();
      }).catch(function(){setErr('网络错误');setLoading(false);});
  }

  return h('div',{className:'login-overlay'},
    h('div',{className:'login-box'},
      h('div',{className:'icon'},'📊'),
      h('h2',null,'WB 财务分析'),
      h('div',{className:'sub'},'登录您的账号'),
      err ? h('div',{className:'login-err'},err) : null,
      h('input',{className:'login-input',type:'text',placeholder:'用户名',value:user,onChange:function(e){setUser(e.target.value);setErr('');}}),
      h('input',{className:'login-input',type:'password',placeholder:'密码',value:pass,onChange:function(e){setPass(e.target.value);setErr('');}}),
      h('button',{className:'login-btn',disabled:loading,onClick:doLogin},loading?'登录中...':'登 录')
    )
  );
}

function ManualTab(props) {
  var S1 = useState(false), processing = S1[0], setProcessing = S1[1];
  var S2 = useState(null), result = S2[0], setResult = S2[1];
  var S3 = useState([]), pfFiles = S3[0], setPfFiles = S3[1];
  var S4 = useState(null), puf = S4[0], setPuf = S4[1];
  var L1 = useState(false), pfl = L1[0], setPfl = L1[1];
  var L2 = useState(false), pufl = L2[0], setPufl = L2[1];
  var S5 = useState(''), uploadErr = S5[0], setUploadErr = S5[1];
  var r1 = useRef(null), r2 = useRef(null);
  var er = props.er, tr = props.tr, fr = props.fr;
  var setEr = props.setEr, setTr = props.setTr, setFr = props.setFr;

  function doUpload(f, type) {
    if(type==="platform")setPfl(true);else setPufl(true);
    var fd = new FormData();
    fd.append('file', f);
    fd.append('file_type', type);
    var hd = {}; var t = getToken(); if (t) hd['Authorization'] = 'Bearer '+t;
    fetch(API+'/reports/upload',{method:'POST',body:fd,headers:hd})
      .then(function(r){return r.json();})
      .then(function(j){
        if(j.status==='success'){
          if(type==='platform'){setPfFiles(function(arr){return arr.concat([f.name]);});}
          else setPuf(f.name);
        }
      })
      .catch(function(){if(type==='platform')setUploadErr('上传失败，请重试');})
      .finally(function(){if(type==='platform')setPfl(false);else setPufl(false);});
  }

  function onFile(e, type) {
    var files = e.target.files;
    for (var i = 0; i < files.length; i++) {
      var f = files[i];
      if (!f || !f.name.match(/\.(xlsx|xls)$/i)) continue;
      doUpload(f, type);
    }
    e.target.value = '';
  }

  function onProcess() {
    if (pfFiles.length < 1) return;
    setProcessing(true); setResult(null);
    var hd = {}; var t = getToken(); if (t) hd['Authorization'] = 'Bearer '+t;
    fetch(API+'/reports/process?exchange_rate='+er+'&tax_rate='+tr+'&fee_rate='+fr,{method:'POST',headers:hd})
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.status==='success'){setResult(d);setPfFiles([]);setPuf(null);}
        setProcessing(false);
      })
      .catch(function(){setProcessing(false);});
  }

  return h('div',null,
    h('div',{className:'card'},
      h('div',{className:'card-title'},'📎 上传报表'),
      h('div',{className:'upload-grid'},
        h('div',null,
          h('div',{className:'drop-zone',onClick:function(){setUploadErr('');r1.current&&r1.current.click();}},
            pfl ? h('div',null,h('div',{style:{fontSize:28}},'⏳'),h('div',{style:{fontSize:14,marginTop:4,color:'#1677ff'}},'上传中...'))
               : pfFiles.length > 0
                 ? h('div',null,h('div',{style:{fontSize:28}},'📄'),h('div',{style:{fontSize:14,marginTop:4}},pfFiles.length+' 个平台报表'))
                 : h('div',null,h('div',{className:'drop-icon'},'📁'),h('div',{style:{fontSize:15,marginBottom:4}},'平台报表'),h('div',{style:{fontSize:12,color:'#999'}},'WB 俄语报表（可多选上传）')),
          ),
          h('input',{type:'file',ref:r1,accept:'.xlsx,.xls',multiple:true,style:{display:'none'},onChange:function(e){onFile(e,'platform');}}),
          pfFiles.length > 0 ? h('div',{style:{marginTop:8}},
            h('div',{className:'file-tag'},'✅ 已上传 '+pfFiles.length+' 个'),
            pfFiles.map(function(f){return h('div',{style:{fontSize:12,color:'#666',padding:'2px 4px'}},'📄 '+f);}))
          : null,
        uploadErr ? h('div',{style:{color:'#ff4d4f',fontSize:12,marginTop:4}},uploadErr) : null
        ),
        h('div',null,
          h('div',{className:'drop-zone',onClick:function(){r2.current&&r2.current.click();}},
            pufl ? h('div',null,h('div',{style:{fontSize:28}},'⏳'),h('div',{style:{fontSize:14,marginTop:4,color:'#1677ff'}},'上传中...'))
                : puf ? h('div',null,h('div',{style:{fontSize:28}},'📄'),h('div',{style:{fontSize:14,marginTop:4}},puf))
                : h('div',null,h('div',{className:'drop-icon'},'📋'),h('div',{style:{fontSize:15,marginBottom:4}},'采购文件'),h('div',{style:{fontSize:12,color:'#999'}},'品名/货本/头程/标签(₽)')),
          ),
          h('input',{type:'file',ref:r2,accept:'.xlsx,.xls',style:{display:'none'},onChange:function(e){onFile(e,'purchase');}}),
          puf ? h('div',{className:'file-tag'},'✅ '+puf) : null
        )
      )
    ),
    h('div',{className:'card'},
      h('div',{className:'card-title'},'⚙️ 处理参数'),
      h('div',{className:'param-grid'},
        h('div',null,h('div',{className:'param-label'},'汇率 (₽→¥)'),h('input',{className:'param-input',type:'number',step:'0.1',value:er,onChange:function(e){setEr(parseFloat(e.target.value)||0)}})),
        h('div',null,h('div',{className:'param-label'},'税率 (%)'),h('input',{className:'param-input',type:'number',step:'0.1',value:tr,onChange:function(e){setTr(parseFloat(e.target.value)||0)}})),
        h('div',null,h('div',{className:'param-label'},'手续费率 (%)'),h('input',{className:'param-input',type:'number',step:'0.1',value:fr,onChange:function(e){setFr(parseFloat(e.target.value)||0)}})),
        h('button',{className:'btn btn-primary',disabled:pfFiles.length<1||processing,onClick:onProcess,style:{padding:'8px 24px'}},
          processing ? '处理中...' : '处理 '+pfFiles.length+' 个')
      ),
      result ? h('div',{className:'result-box'},
        h('span',{className:'msg'},'✅ 处理完成！商品:'+(result.stats?.products||'')+' 销售:'+(result.stats?.sales_rows||'')),
        h('a',{className:'btn btn-success',href:result.download_url,target:'_blank'},'📥 下载')
      ) : null
    )
  );
}

function AutoFetchTab(props) {
  var S1 = useState(false), fetching = S1[0], setFetching = S1[1];
  var S2 = useState(''), startDate = S2[0], setStartDate = S2[1];
  var S3 = useState(''), endDate = S3[0], setEndDate = S3[1];
  var S4 = useState(null), fetchResult = S4[0], setFetchResult = S4[1];
  var er = props.er, tr = props.tr, fr = props.fr;
  var setEr = props.setEr, setTr = props.setTr, setFr = props.setFr;

  function onAutoFetch() {
    if (!startDate || !endDate) { alert('请选择日期范围'); return; }
    setFetching(true); setFetchResult(null);
    var fd = new FormData();
    fd.append('start_date', startDate);
    fd.append('end_date', endDate);
    fd.append('exchange_rate', String(er));
    fd.append('tax_rate', String(tr));
    fd.append('fee_rate', String(fr));
    var hd = {}; var t = getToken(); if (t) hd['Authorization'] = 'Bearer '+t;
    fetch(API+'/reports/fetch-auto',{method:'POST',body:fd,headers:hd})
      .then(function(r){return r.json().then(function(d){return {status:r.status,data:d};});})
      .then(function(r){
        if (r.status !== 200) throw new Error(r.data.detail||'请求失败');
        setFetchResult(r.data);
        setFetching(false);
      })
      .catch(function(e){alert('自动分析失败: '+e.message);setFetching(false);});
  }

  return h('div',null,
    h('div',{className:'card'},
      h('div',{className:'card-title'},'🚀 自动拉取 WB 报表'),
      h('div',{className:'fetch-grid'},
        h('div',null,
          h('div',{className:'param-label'},'开始日期'),
          h('input',{className:'date-input',type:'date',value:startDate,onChange:function(e){setStartDate(e.target.value);setFetchResult(null);}})
        ),
        h('div',null,
          h('div',{className:'param-label'},'结束日期'),
          h('input',{className:'date-input',type:'date',value:endDate,onChange:function(e){setEndDate(e.target.value);setFetchResult(null);}})
        ),
        h('div',null,
          h('div',{className:'param-label'},'汇率 (₽→¥)'),
          h('input',{className:'param-input',type:'number',step:'0.1',value:er,onChange:function(e){setEr(parseFloat(e.target.value)||0)}})
        ),
        h('div',null,
          h('div',{className:'param-label'},'税率 %'),
          h('input',{className:'param-input',type:'number',step:'0.1',value:tr,onChange:function(e){setTr(parseFloat(e.target.value)||0)}})
        ),
        h('div',null,
          h('div',{className:'param-label'},'手续费率 %'),
          h('input',{className:'param-input',type:'number',step:'0.1',value:fr,onChange:function(e){setFr(parseFloat(e.target.value)||0)}})
        ),
        h('div',null,
          h('button',{
            className:'btn btn-primary',
            disabled:fetching||!startDate||!endDate,
            onClick:onAutoFetch,
            style:{padding:'8px 24px',width:'100%'}
          }, fetching ? '拉取中...' : '自动分析')
        )
      ),
      fetching ? h('div',{className:'fetch-progress'},'⏳ 正在从 WB 拉取报表数据并生成利润表...') : null,
      fetchResult ? h('div',{className:'result-box'},
        h('span',{className:'msg'},
          '✅ 分析完成！记录:'+(fetchResult.stats?.total_rows||0)+' 商品:'+(fetchResult.stats?.products||0)
        ),
        h('a',{className:'btn btn-success',href:fetchResult.download_url,target:'_blank'},'📥 下载利润表')
      ) : null
    )
  );
}

function Page(props) {
  function doLogout() { localStorage.removeItem('wb_token'); localStorage.removeItem('wb_user'); props.onLogout(); }

  var S1 = useState('manual'), tab = S1[0], setTab = S1[1];
  var S2 = useState(12.5), er = S2[0], setEr = S2[1];
  var S3 = useState(7), tr = S3[0], setTr = S3[1];
  var S4 = useState(12), fr = S4[0], setFr = S4[1];

  var tabs = [
    {key:'manual', label:'📎 手动处理'},
  ];

  return h('div',null,
    h('div',{className:'header'},
      h('h1',null,'WB 财务分析'),
      h('span',{className:'logout-btn',onClick:doLogout},'退出')
    ),
    h('div',{className:'tab-bar'},
      tabs.map(function(t){
        return h('div',{
          key:t.key,
          className:'tab-item'+(tab===t.key?' active':''),
          onClick:function(){setTab(t.key);}
        }, t.label);
      })
    ),
    h('div',{className:'container'},
      h(ManualTab,{er:er,tr:tr,fr:fr,setEr:setEr,setTr:setTr,setFr:setFr})
    )
  );
}

function App() {
  var S = useState(null), loggedIn = S[0], setLoggedIn = S[1];
  var S2 = useState(false), checked = S2[0], setChecked = S2[1];

  useEffect(function(){
    var t = localStorage.getItem('wb_token');
    if (t) {
      var hd = {'Authorization':'Bearer '+t};
      fetch(API+'/auth/verify',{headers:hd}).then(function(r){
        if (r.ok) { setLoggedIn(true); } else { localStorage.removeItem('wb_token'); localStorage.removeItem('wb_user'); }
        setChecked(true);
      }).catch(function(){setChecked(true);});
    } else { setChecked(true); }
  }, []);

  if (!checked) return null;
  if (!loggedIn) return h(LoginPage,{onLogin:function(){setLoggedIn(true);}});
  return h(Page,{onLogout:function(){setLoggedIn(false);}});
}

createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
