<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>WB 财务分析系统</title>
  <link rel="stylesheet" href="https://unpkg.com/antd@5/dist/reset.css"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/dayjs/dayjs.min.js"></script>
  <script src="https://unpkg.com/@ant-design/charts@1.4.0/dist/antd-charts.min.js"></script>
  <script src="https://unpkg.com/antd@5/dist/antd.min.js"></script>
  <script src="https://unpkg.com/@ant-design/icons@5/dist/index.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .ant-layout-sider .ant-layout-sider-children { overflow: auto; }
    .ant-layout-sider::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const { Layout, Menu, Card, Row, Col, Statistic, Table, Tag, Button, Space, Typography, Spin, message, Empty } = antd;
const { SyncOutlined, DashboardOutlined, ShoppingCartOutlined, InboxOutlined, BarChartOutlined, CloudSyncOutlined } = icons;
const { Line, Column, Pie } = charts;
const { Sider, Content } = Layout;
const { Title } = Typography;

const API = '/api/v1';
async function fetchAPI(path) {
  const resp = await fetch(`${API}${path}`);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return resp.json();
}
async function postAPI(path, body) {
  const resp = await fetch(`${API}${path}`, { method: 'POST', headers: {'Content-Type': 'application/json'} });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return resp.json();
}
function fmt(n) { return (n||0).toLocaleString('ru-RU',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fd(d) { return d ? d.split('T')[0] : '-'; }

function Dashboard() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(() => { fetchAPI('/dashboard').then(d=>{setData(d);setLoading(false)}).catch(()=>{message.error('加载失败');setLoading(false)}); }, []);
  if (loading) return <Spin size="large" style={{display:'block',margin:'100px auto'}}/>;
  if (!data) return <Empty description="暂无数据，请先同步"/>;
  const t = data.today||{}, m = data.this_month||{}, s = data.stocks||{}, trend = data.trend||[];
  return (<div>
    <Title level={4}>📊 财务概览</Title>
    <Row gutter={[16,16]}>
      <Col xs={24} sm={12} lg={6}><Card><Statistic title="今日销售额" value={t.sales||0} prefix="₽" precision={2} valueStyle={{color:'#cf1322'}}/></Card></Col>
      <Col xs={24} sm={12} lg={6}><Card><Statistic title="今日实收" value={t.for_pay||0} prefix="₽" precision={2} valueStyle={{color:'#3f8600'}}/></Card></Col>
      <Col xs={24} sm={12} lg={6}><Card><Statistic title="今日订单" value={t.orders||0} suffix="单"/></Card></Col>
      <Col xs={24} sm={12} lg={6}><Card><Statistic title="今日佣金" value={t.commission||0} prefix="₽" precision={2} valueStyle={{color:'#faad14'}}/></Card></Col>
      <Col xs={24} sm={12} lg={6}><Card><Statistic title="本月销售额" value={m.sales||0} prefix="₽" precision={2}/></Card></Col>
      <Col xs={24} sm={12} lg={6}><Card><Statistic title="本月实收" value={m.for_pay||0} prefix="₽" precision={2} valueStyle={{color:'#3f8600'}}/></Card></Col>
      <Col xs={24} sm={12} lg={6}><Card><Statistic title="本月订单" value={m.orders||0} suffix="单"/></Card></Col>
      <Col xs={24} sm={12} lg={6}><Card><Statistic title="库存总值" value={s.total_value||0} prefix="₽" precision={2}/></Card></Col>
    </Row>
    <Card title="📈 近7天销售趋势" style={{marginTop:16}}>
      {trend.length>0?<Line data={trend.map(d=>({date:d.date,sales:d.sales}))} xField="date" yField="sales" smooth point={{size:3}} height={300}/>:<Empty description="暂无趋势数据"/>}
    </Card>
    <Card title="⚡ 快速操作" style={{marginTop:16}}>
      <Space><Button type="primary" icon={<SyncOutlined/>} onClick={async()=>{message.loading({content:'同步中...',key:'sync'});try{const r=await postAPI('/sync/all');message.success({content:\`同步完成！销售:\${r.sales?.new_records||0} 订单:\${r.orders?.new_records||0} 库存:\${r.stocks?.records||0}\`,key:'sync'});setTimeout(()=>window.location.reload(),1000)}catch(e){message.error({content:'同步失败',key:'sync'})}}}>同步所有数据</Button></Space>
    </Card>
  </div>);
}

function SalesAnalysis() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [page, setPage] = useState(1);
  const [topProducts, setTopProducts] = useState(null);
  useEffect(() => { Promise.all([fetchAPI(\`/sales?page=\${page}&page_size=20\`), fetchAPI('/products/top?days=30&limit=10')]).then(([s,t])=>{setData(s);setTopProducts(t);setLoading(false)}).catch(()=>{message.error('加载失败');setLoading(false)}); }, [page]);
  if (loading) return <Spin size="large" style={{display:'block',margin:'100px auto'}}/>;
  const cols = [
    {title:'日期',dataIndex:'date',render:d=>fd(d),width:80},
    {title:'商品',dataIndex:'supplier_article',ellipsis:true},
    {title:'总价',dataIndex:'total_price',render:v=>\`₽\${fmt(v)}\`,width:100,sorter:(a,b)=>a.total_price-b.total_price},
    {title:'实收',dataIndex:'for_pay',render:v=>\`₽\${fmt(v)}\`,width:100,sorter:(a,b)=>a.for_pay-b.for_pay},
    {title:'仓库',dataIndex:'warehouse_name',width:100},
  ];
  const topData = (topProducts?.items||[]).map(p=>({article:(p.article||'').substring(0,12)||String(p.nm_id),revenue:p.revenue}));
  return (<div>
    <Title level={4}>📦 销售明细</Title>
    <Row gutter={16}>
      <Col xs={24} lg={16}><Card><Table dataSource={data?.items||[]} columns={cols} rowKey="id" size="small" pagination={{current:page,total:data?.total||0,pageSize:20,onChange:p=>setPage(p),showTotal:t=>\`共 \${t} 条\`}}/></Card></Col>
      <Col xs={24} lg={8}><Card title="🏆 热销 TOP10">{topData.length>0?<Column data={topData} xField="article" yField="revenue" height={400}/>:<Empty description="暂无数据"/>}</Card></Col>
    </Row>
  </div>);
}

function Orders() {
  const [data,setData]=useState(null);const[loading,setLoading]=useState(true);const[page,setPage]=useState(1);const[filter,setFilter]=useState('all');
  useEffect(()=>{let p=\`/orders?page=\${page}&page_size=20\`;if(filter==='cancelled')p+='&is_cancel=true';else if(filter==='active')p+='&is_cancel=false';fetchAPI(p).then(d=>{setData(d);setLoading(false)}).catch(()=>{message.error('加载失败');setLoading(false)});},[page,filter]);
  if(loading)return<Spin size="large" style={{display:'block',margin:'100px auto'}}/>;
  const cols=[{title:'日期',dataIndex:'date',render:d=>fd(d),width:80},{title:'商品',dataIndex:'supplier_article',ellipsis:true},{title:'总价',dataIndex:'total_price',render:v=>\`₽\${fmt(v)}\`,width:100},{title:'成交价',dataIndex:'finished_price',render:v=>\`₽\${fmt(v)}\`,width:100},{title:'状态',dataIndex:'is_cancel',render:v=>v?<Tag color="red">已取消</Tag>:<Tag color="green">有效</Tag>,width:60},{title:'仓库',dataIndex:'warehouse_name',width:100}];
  return(<div><Title level={4}>📋 订单列表</Title><Card><Space style={{marginBottom:16}}><Button type={filter==='all'?'primary':'default'}onClick={()=>{setFilter('all');setPage(1)}}>全部</Button><Button type={filter==='active'?'primary':'default'}onClick={()=>{setFilter('active');setPage(1)}}>有效</Button><Button type={filter==='cancelled'?'primary':'default'}onClick={()=>{setFilter('cancelled');setPage(1)}}>已取消</Button></Space><Table dataSource={data?.items||[]} columns={cols} rowKey="id" size="small" pagination={{current:page,total:data?.total||0,pageSize:20,onChange:p=>setPage(p),showTotal:t=>\`共 \${t} 条\`}}/></Card></div>);
}

function Stocks() {
  const [data,setData]=useState(null);const[loading,setLoading]=useState(true);
  useEffect(()=>{fetchAPI('/stocks?page=1&page_size=20').then(d=>{setData(d);setLoading(false)}).catch(()=>{message.error('加载失败');setLoading(false)});},[]);
  if(loading)return<Spin size="large" style={{display:'block',margin:'100px auto'}}/>;
  const wh=(data?.warehouses||[]).map(w=>({name:w.name,value:w.value}));
  const cols=[{title:'商品',dataIndex:'supplier_article',ellipsis:true,width:150},{title:'NM ID',dataIndex:'nm_id',width:100},{title:'库存',dataIndex:'quantity',width:60},{title:'单价',dataIndex:'price',render:v=>\`₽\${fmt(v)}\`,width:80},{title:'总价值',dataIndex:'total_value',render:v=>\`₽\${fmt(v)}\`,width:100,sorter:(a,b)=>a.total_value-b.total_value}];
  const tv=(data?.items||[]).reduce((s,i)=>s+(i.total_value||0),0);
  return(<div><Title level={4}>📦 库存概览</Title><Row gutter={16}><Col span={6}><Card><Statistic title="SKU 总数" value={data?.total||0}/></Card></Col><Col span={6}><Card><Statistic title="库存总值" value={tv} prefix="₽" precision={2}/></Card></Col></Row><Row gutter={16} style={{marginTop:16}}><Col xs={24} lg={8}><Card title="仓库分布">{wh.length>0?<Pie data={wh} angleField="value" colorField="name" height={300}/>:<Empty description="暂无数据"/>}</Card></Col><Col xs={24} lg={16}><Card><Table dataSource={data?.items||[]} columns={cols} rowKey="id" size="small" pagination={{pageSize:20,showTotal:t=>\`共 \${t} 条\`}}/></Card></Col></Row></div>);
}

function Reports() {
  const [data,setData]=useState(null);const[loading,setLoading]=useState(true);
  useEffect(()=>{Promise.all([fetchAPI('/reports/daily?days=30'),fetchAPI('/reports/summary?days=30')]).then(([d,s])=>{setData({daily:d,summary:s});setLoading(false)}).catch(()=>{message.error('加载失败');setLoading(false)});},[]);
  if(loading)return<Spin size="large" style={{display:'block',margin:'100px auto'}}/>;if(!data)return<Empty description="暂无数据"/>;
  const s=data.summary||{},dd=(data.daily?.items||[]).slice().reverse();
  const cols=[{title:'日期',dataIndex:'date',render:d=>fd(d)},{title:'销售额',dataIndex:'sales',render:v=>\`₽\${fmt(v)}\`},{title:'实收',dataIndex:'for_pay',render:v=>\`₽\${fmt(v)}\`},{title:'订单数',dataIndex:'orders'},{title:'佣金',dataIndex:'commission',render:v=>\`₽\${fmt(v)}\`}];
  return(<div><Title level={4}>📊 财务报表</Title><Row gutter={[16,16]}><Col xs={12} lg={8}><Card><Statistic title="30天销售额" value={s.total_sales||0} prefix="₽" precision={2}/></Card></Col><Col xs={12} lg={8}><Card><Statistic title="30天净收入" value={s.net_revenue||0} prefix="₽" precision={2} valueStyle={{color:'#3f8600'}}/></Card></Col><Col xs={12} lg={8}><Card><Statistic title="30天佣金" value={s.total_commission||0} prefix="₽" precision={2} valueStyle={{color:'#faad14'}}/></Card></Col></Row><Card title="📈 每日报表" style={{marginTop:16}}><Table dataSource={dd} columns={cols} rowKey="date" size="small" pagination={false}/></Card></div>);
}

function App() {
  const [collapsed, setCollapsed] = useState(false);
  const [page, setPage] = useState('dashboard');
  const pages = {dashboard:Dashboard, sales:SalesAnalysis, orders:Orders, stocks:Stocks, reports:Reports};
  const PageComponent = pages[page] || Dashboard;
  const items = [
    {key:'dashboard',icon:<DashboardOutlined/>,label:'仪表盘'},
    {key:'sales',icon:<BarChartOutlined/>,label:'销售分析'},
    {key:'orders',icon:<ShoppingCartOutlined/>,label:'订单管理'},
    {key:'stocks',icon:<InboxOutlined/>,label:'库存概览'},
    {key:'reports',icon:<CloudSyncOutlined/>,label:'财务报表'},
  ];
  return (<Layout style={{minHeight:'100vh'}}>
    <Sider collapsible collapsed={collapsed} onCollapse={setCollapsed} theme="dark">
      <div style={{height:64,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:collapsed?14:18,fontWeight:'bold',borderBottom:'1px solid #333'}}>
        {collapsed?'WB':'WB 财务分析'}
      </div>
      <Menu theme="dark" mode="inline" selectedKeys={[page]} items={items} onClick={({key}) => setPage(key)}/>
    </Sider>
    <Layout><Content style={{margin:16,padding:24,background:'#f5f5f5',minHeight:280}}><PageComponent/></Content></Layout>
  </Layout>);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
